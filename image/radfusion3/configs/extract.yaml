n_gpus: 1
get_features: true
stage: extract
test_split: all

exp:
  base_dir: /scratch/pkrish52/INSPECT/output/ct_extract_exp
  name: all

trainer:
  weights_summary: top
  seed: 6
  val_check_interval: 1.0
  limit_val_batches: 1.0
