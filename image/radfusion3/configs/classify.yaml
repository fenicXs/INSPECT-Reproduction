n_gpus: 1
get_features: true
stage: classify
output_dir: /scratch/pkrish52/INSPECT/output/ct_classify_logs
test_split: test
ckpt: null

lr: 0.0005
optimizer:
  name: AdamW
loss:
  loss_fn: BCEWithLogitsLoss

monitor:
  metric: val/mean_auroc
  mode: max

exp:
  base_dir: /scratch/pkrish52/INSPECT/output/ct_classify_exp
  name: 'classify'

trainer:
  weights_summary: top
  seed: 6
  val_check_interval: 1.0
  limit_val_batches: 1.0
  precision: 16
  max_epochs: 30
  gradient_clip_val: 0
  num_workers: 8
  strategy: auto
  position_encoding: true

defaults:
  - _self_
  - dataset: stanford_featurized
  - model: model_1d
